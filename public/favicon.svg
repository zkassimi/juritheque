<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fond arrondi navy -->
  <rect width="64" height="64" rx="14" fill="#1a2744"/>

  <!-- Balance de Justice — tige centrale -->
  <line x1="32" y1="12" x2="32" y2="52" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Barre horizontale -->
  <line x1="14" y1="20" x2="50" y2="20" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Chaîne gauche -->
  <line x1="18" y1="20" x2="18" y2="32" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Plateau gauche -->
  <path d="M10 34 Q18 38 26 34" stroke="#C9A84C" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Chaîne droite -->
  <line x1="46" y1="20" x2="46" y2="32" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Plateau droit -->
  <path d="M38 34 Q46 38 54 34" stroke="#C9A84C" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Socle -->
  <line x1="26" y1="52" x2="38" y2="52" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
</svg>
